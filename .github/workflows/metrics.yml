name: GitHub Metrics

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: larissamarialima09

          template: classic
          base: header, activity, repositories

          plugin_languages: yes
          plugin_isocalendar: yes
          plugin_lines: yes
          plugin_stars: yes
